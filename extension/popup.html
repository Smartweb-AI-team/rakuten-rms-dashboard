<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; padding: 14px; font-family: -apple-system, sans-serif; margin: 0; color: #15181e }
    h3 { margin: 0 0 12px 0; font-size: 15px; font-weight: 700 }
    .row { background: #fafbfc; padding: 9px 11px; border-radius: 7px; border: 1px solid #eef0f2; margin-bottom: 8px; font-size: 11px }
    .row .lbl { color: #888; font-weight: 600; margin-bottom: 3px; font-size: 10px; text-transform: uppercase; letter-spacing: .3px }
    .row .val { color: #15181e; word-break: break-all; font-family: ui-monospace, monospace; font-size: 11.5px }
    .val.empty { color: #bf0000; font-style: italic }
    .status { font-size: 11px; color: #666; min-height: 14px }
    .status.ok { color: #0c7a3e } .status.err { color: #bf0000 }
    button { width: 100%; padding: 10px; background: #bf0000; color: #fff; border: none; border-radius: 6px;
             cursor: pointer; font-weight: 700; font-size: 12.5px; margin-top: 4px }
    button:hover { background: #a00000 }
    hr { border: none; border-top: 1px solid #eee; margin: 10px 0 }
    .ft { font-size: 10px; color: #999; text-align: center; margin-top: 8px }
  </style>
</head>
<body>
  <h3>Rakuten RMS Analytics</h3>

  <div class="row">
    <div class="lbl">ダッシュボードURL</div>
    <div class="val" id="cfgUrlDisplay">未接続</div>
  </div>
  <div class="row">
    <div class="lbl">認証状態</div>
    <div class="val" id="cfgAuthStatus">—</div>
  </div>
  <div class="status" id="setupHint"></div>

  <hr>

  <button id="btnSendNow">Cookieを今すぐ送信</button>
  <div id="sendResult" class="status" style="margin-top:6px"></div>

  <div class="ft">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
